<!-- Skills Management Panel -->
<div x-show="activePanel === 'skills'" class="h-full flex flex-col">
    <!-- Header -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-white/10">
        <div>
            <h2 class="text-xl font-semibold text-white">技能管理</h2>
            <p class="text-sm text-white/60 mt-1">
                <span x-text="skills.filter(s => s.enabled).length"></span> 个已启用 /
                <span x-text="skills.length"></span> 个总计
            </p>
        </div>
        <button @click="reloadSkills()"
            class="px-4 py-2 bg-blue-500/20 hover:bg-blue-500/30 text-blue-300 rounded-lg transition-colors text-sm">
            刷新
        </button>
    </div>

    <!-- Search and Filter -->
    <div class="px-6 py-3 border-b border-white/10 space-y-2">
        <input type="text" x-model="skillSearchQuery" placeholder="搜索技能名称或描述..."
            class="w-full px-4 py-2 bg-white/5 border border-white/10 rounded-lg text-white placeholder-white/40 focus:outline-none focus:border-blue-500/50 text-sm">
        <div class="flex gap-2">
            <button @click="skillStatusFilter = 'all'"
                :class="skillStatusFilter === 'all' ? 'bg-blue-500/30 text-blue-300' : 'bg-white/5 text-white/50'"
                class="px-3 py-1 rounded-lg text-xs transition-colors">全部</button>
            <button @click="skillStatusFilter = 'enabled'"
                :class="skillStatusFilter === 'enabled' ? 'bg-green-500/30 text-green-300' : 'bg-white/5 text-white/50'"
                class="px-3 py-1 rounded-lg text-xs transition-colors">已启用</button>
            <button @click="skillStatusFilter = 'disabled'"
                :class="skillStatusFilter === 'disabled' ? 'bg-gray-500/30 text-gray-300' : 'bg-white/5 text-white/50'"
                class="px-3 py-1 rounded-lg text-xs transition-colors">已禁用</button>
        </div>
    </div>

    <!-- Grouped Skills List -->
    <div class="flex-1 overflow-y-auto px-4 py-3 space-y-2">

        <template x-for="[category, categorySkills] in groupedSkills" :key="category">
            <div x-data="{ open: false }" class="bg-white/5 border border-white/10 rounded-xl overflow-hidden">

                <!-- Category Header (clickable to collapse) -->
                <button @click="open = !open"
                    class="w-full flex items-center justify-between px-4 py-3 hover:bg-white/5 transition-colors">
                    <div class="flex items-center gap-2">
                        <svg class="w-4 h-4 text-blue-300/70" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                        </svg>
                        <span class="text-white/80 text-sm font-medium capitalize" x-text="category"></span>
                        <span class="text-white/30 text-xs"
                            x-text="'(' + categorySkills.length + ')'"></span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs"
                            :class="categorySkills.every(s => s.enabled) ? 'text-green-400/60' : categorySkills.some(s => s.enabled) ? 'text-yellow-400/60' : 'text-white/20'"
                            x-text="categorySkills.filter(s => s.enabled).length + '/' + categorySkills.length + ' 启用'">
                        </span>
                        <svg class="w-3.5 h-3.5 text-white/30 transition-transform" :class="open ? 'rotate-180' : ''"
                            fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                        </svg>
                    </div>
                </button>

                <!-- Skills in this category -->
                <div x-show="open" x-transition.duration.150ms class="skill-group-body divide-y divide-white/5">
                    <template x-for="skill in categorySkills" :key="skill.name">
                        <div class="px-4 py-3">
                            <div class="flex items-start justify-between gap-3">
                                <div class="flex-1 min-w-0">
                                    <!-- Name + status badge -->
                                    <div class="flex items-center gap-2 mb-0.5">
                                        <span class="text-white/90 text-sm font-mono" x-text="skill.name"></span>
                                        <span x-show="!skill.enabled"
                                            class="px-1.5 py-0.5 bg-gray-500/20 text-gray-400 text-[10px] rounded">禁用</span>
                                    </div>
                                    <!-- Description -->
                                    <p class="text-xs text-white/45 line-clamp-2" x-text="skill.description"></p>

                                    <!-- Config section -->
                                    <div x-show="skill.ui_config && skill.ui_config.length > 0" class="mt-2">
                                        <button @click="skill._showConfig = !skill._showConfig"
                                            class="text-blue-400/70 hover:text-blue-300 text-xs flex items-center gap-1 transition-colors">
                                            <svg class="w-3 h-3 transition-transform" :class="{'rotate-90': skill._showConfig}"
                                                fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                                            </svg>
                                            <span x-text="skill._showConfig ? '收起配置' : '配置'"></span>
                                        </button>
                                        <div x-show="skill._showConfig" x-transition.opacity.duration.150ms
                                            class="mt-2 p-3 bg-black/20 rounded-lg border border-white/5 space-y-2">
                                            <template x-for="field in skill.ui_config" :key="field.key">
                                                <div>
                                                    <label class="block text-[11px] text-white/60 mb-1" x-text="field.label"></label>
                                                    <template x-if="field.type === 'text'">
                                                        <input type="text" x-model="skill.config_values[field.key]"
                                                            :placeholder="field.default ?? ''"
                                                            class="w-full px-2 py-1 bg-white/5 border border-white/10 rounded text-white text-xs focus:outline-none focus:border-blue-500/50">
                                                    </template>
                                                    <template x-if="field.type === 'secret'">
                                                        <input type="password" x-model="skill.config_values[field.key]"
                                                            :placeholder="field.default ?? ''"
                                                            class="w-full px-2 py-1 bg-white/5 border border-white/10 rounded text-white text-xs focus:outline-none focus:border-blue-500/50">
                                                    </template>
                                                    <template x-if="field.type === 'select'">
                                                        <select x-model="skill.config_values[field.key]"
                                                            class="w-full px-2 py-1 bg-white/5 border border-white/10 rounded text-white text-xs focus:outline-none">
                                                            <template x-for="opt in field.options" :key="opt">
                                                                <option :value="opt" x-text="opt" class="bg-gray-800"></option>
                                                            </template>
                                                        </select>
                                                    </template>
                                                    <template x-if="field.type === 'bool'">
                                                        <label class="flex items-center gap-2 cursor-pointer">
                                                            <input type="checkbox" x-model="skill.config_values[field.key]"
                                                                class="w-3 h-3 rounded">
                                                            <span class="text-xs text-white/50" x-text="field.label"></span>
                                                        </label>
                                                    </template>
                                                </div>
                                            </template>
                                            <div class="flex justify-end pt-1">
                                                <button @click="saveSkillConfig(skill)"
                                                    class="px-3 py-1 bg-blue-500/20 hover:bg-blue-500/30 text-blue-300 rounded text-xs transition-colors">
                                                    <span x-text="skill._saving ? '保存中...' : '保存'"></span>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <!-- Toggle switch -->
                                <label class="relative inline-flex items-center cursor-pointer shrink-0 mt-0.5">
                                    <input type="checkbox" :checked="skill.enabled"
                                        @change="toggleSkill(skill.name, $event.target.checked)" class="sr-only peer">
                                    <div class="w-9 h-5 bg-gray-600/50 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-500"></div>
                                </label>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </template>

        <!-- Empty State -->
        <div x-show="groupedSkills.length === 0" class="text-center py-12">
            <p class="text-white/40 text-sm">未找到匹配的技能</p>
        </div>
    </div>
</div>
