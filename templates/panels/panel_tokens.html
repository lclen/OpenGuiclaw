<!-- ═══════════════ TOKEN STATS PANEL ═══════════════ -->
<div x-show="activePanel === 'tokens'" style="display:none;" class="flex flex-col h-full">

    <!-- Header -->
    <div class="flex items-center justify-between px-4 py-3 border-b border-white/10 shrink-0">
        <div class="flex items-center gap-2">
            <svg class="w-4 h-4 text-blue-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
            </svg>
            <span class="text-white/90 text-sm font-medium">Token 统计</span>
        </div>
        <div class="flex items-center gap-2">
            <button @click="loadTokenStats()"
                class="text-white/50 hover:text-white/90 transition-colors p-1 rounded" title="刷新">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
            </button>
            <button @click="resetTokenStats()"
                class="text-white/50 hover:text-red-400 transition-colors p-1 rounded" title="重置统计">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
            </button>
        </div>
    </div>

    <!-- Content -->
    <div class="flex-1 overflow-y-auto p-4 space-y-4">

        <!-- Summary cards -->
        <div class="grid grid-cols-2 gap-3">
            <div class="bg-white/5 rounded-xl p-3 border border-white/10">
                <div class="text-white/40 text-xs mb-1">总 Token</div>
                <div class="text-white text-xl font-semibold" x-text="formatNum(tokenStats.total_tokens)">—</div>
            </div>
            <div class="bg-white/5 rounded-xl p-3 border border-white/10">
                <div class="text-white/40 text-xs mb-1">请求次数</div>
                <div class="text-white text-xl font-semibold" x-text="formatNum(tokenStats.request_count)">—</div>
            </div>
            <div class="bg-white/5 rounded-xl p-3 border border-white/10">
                <div class="text-white/40 text-xs mb-1">输入 Token</div>
                <div class="text-blue-300 text-xl font-semibold" x-text="formatNum(tokenStats.total_prompt_tokens)">—</div>
            </div>
            <div class="bg-white/5 rounded-xl p-3 border border-white/10">
                <div class="text-white/40 text-xs mb-1">输出 Token</div>
                <div class="text-green-300 text-xl font-semibold" x-text="formatNum(tokenStats.total_completion_tokens)">—</div>
            </div>
        </div>

        <!-- Input/Output ratio bar -->
        <div x-show="tokenStats.total_tokens > 0">
            <div class="flex justify-between text-xs text-white/40 mb-1">
                <span>输入占比</span>
                <span x-text="tokenStats.total_tokens > 0 ? Math.round(tokenStats.total_prompt_tokens / tokenStats.total_tokens * 100) + '%' : '—'"></span>
            </div>
            <div class="h-2 bg-white/10 rounded-full overflow-hidden">
                <div class="h-full bg-gradient-to-r from-blue-400 to-green-400 rounded-full transition-all duration-500"
                    :style="'width:' + (tokenStats.total_tokens > 0 ? Math.round(tokenStats.total_prompt_tokens / tokenStats.total_tokens * 100) : 0) + '%'">
                </div>
            </div>
            <div class="flex justify-between text-xs text-white/30 mt-1">
                <span class="text-blue-300">■ 输入</span>
                <span class="text-green-300">■ 输出</span>
            </div>
        </div>

        <!-- Per-model breakdown -->
        <div x-show="Object.keys(tokenStats.by_model || {}).length > 0">
            <div class="text-white/50 text-xs font-medium mb-2 uppercase tracking-wider">按模型分布</div>
            <div class="space-y-2">
                <template x-for="[model, stat] in Object.entries(tokenStats.by_model || {})" :key="model">
                    <div class="bg-white/5 rounded-xl p-3 border border-white/10">
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-white/80 text-xs font-mono truncate max-w-[60%]" x-text="model"></span>
                            <span class="text-white/50 text-xs" x-text="stat.count + ' 次'"></span>
                        </div>
                        <div class="flex gap-3 text-xs">
                            <span class="text-blue-300">↑ <span x-text="formatNum(stat.prompt)"></span></span>
                            <span class="text-green-300">↓ <span x-text="formatNum(stat.completion)"></span></span>
                            <span class="text-white/50">= <span x-text="formatNum(stat.total)"></span></span>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- Empty state -->
        <div x-show="tokenStats.request_count === 0"
            class="flex flex-col items-center justify-center py-12 text-white/30">
            <svg class="w-10 h-10 mb-3 opacity-40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                    d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
            </svg>
            <span class="text-sm">暂无统计数据</span>
            <span class="text-xs mt-1">发送消息后将自动记录</span>
        </div>

    </div>
</div>
